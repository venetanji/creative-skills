# Drama-video sample spec — "Fennie's Moment"
#
# 60s dialogue-driven scene: Fennie practising alone late at night,
# struggling to land a balance, trainer quietly encourages. Audio bed is
# the existing scene_complete_v4.mp3 (generated via the elevenlabs skill;
# cue timestamps in scene_complete_v4.cues.json).
#
# Copy this into your project dir, adjust paths, and run:
#     drama_video.py plan <spec.yaml>
#     drama_video.py all  <spec.yaml>
#
# Shot boundaries were pulled from the cues sidecar so each shot starts
# on a pause (natural cut point) and ends before the next line starts.

title: "Fennie's Moment"
description: "Fennie trains alone in the late-night dance studio, working the same balance over and over. Her trainer quietly steps in and reframes it, and Fennie resets for one more attempt."

character:
  name: Fennie
  anchor: ./media/outbound/fennie_anchor_00001_.png
  description: "Fennie, a 17-year-old Korean ballet trainee with straight black hair pulled into a tight bun, sharp focused dark eyes, lean dancer's build, wearing a simple black leotard and pale pink tights, barefoot in a late-night practice studio"

video:
  fps: 24
  resolution: [1024, 576]
  negative: "cartoon, text, watermark, distorted face, still frame, low quality, extra fingers, duplicate limbs, mutated hands"
  tail_buffer_sec: 0.5

audio:
  # Pre-generated by the elevenlabs skill — dialogue + bg mix, 60s
  file: ./outputs/fennie_scene/scene_complete_v4.mp3
  cues: ./outputs/fennie_scene/scene_complete_v4.cues.json

gate_confirm_audio: false      # audio already rendered
gate_confirm_anchors: true     # stop after anchors for a review pass

# Five shots, each ≤ 14s. Starts align to pauses in the cues sidecar so
# cuts never land mid-word. @anchor = character.anchor; @last chains
# identity across cuts.
shots:
  # 1) 0.00 → 12.79s — opening "Focus" + pause + "Focus... again" + pause
  - label: opening_focus
    start_sec: 0.00
    duration_sec: 12.79
    image: "@anchor"
    camera_lora: static
    camera_lora_strength: 0.8
    prompt: "Medium close shot of {character} standing alone in the centre of a late-night ballet studio. She lowers her chin, exhales slowly, rolls her shoulders back, and rises onto the balls of her feet — quick careful breath, gaze straight ahead past camera at the mirror. Single overhead spotlight; wooden floor; tall windows behind with distant city lights. Soft handheld camera, almost no movement. Cinematic indie-film feel, natural light, 35mm grain."
    anchor:
      type: i2i
      reference: ./media/outbound/fennie_anchor_00001_.png
      prompt: "{character} standing at rest in the centre of a late-night ballet studio — arms at her sides, chin slightly lowered, feet in first position. Overhead spotlight casts a tight pool; rest of the room in shadow. Wooden floor scuffed with rosin. Tall windows behind her showing distant city lights. Quiet, focused, slightly melancholy atmosphere. Cinematic indie-film composition, natural light, 35mm grain, shallow depth of field."

  # 2) 12.79 → 23.22s — line 3 "Not good enough. Not yet." + pause
  - label: frustration
    start_sec: 12.79
    duration_sec: 10.43
    image: "@last"
    camera_lora: dolly-in
    camera_lora_strength: 0.9
    prompt: "{character} loses the balance. She exhales sharply, lets her arms drop, and sinks onto one knee on the wooden floor, head down, forehead nearly touching her fingertips. Her shoulders rise and fall with fast recovery breaths. Slow dolly-in from medium to tight, ending on the side of her face. Same overhead spotlight, same studio. Cinematic indie-film feel, grain, natural light."

  # 3) 23.22 → 35.50s — trainer's long encouraging line + pause
  - label: trainer_encourages
    start_sec: 23.22
    duration_sec: 12.28
    image: "@last"
    camera_lora: dolly-left            # note: only dolly-{in,out,left,right}, jib-{up,down}, static are valid LTX camera LoRAs
    camera_lora_strength: 0.9
    prompt: "A second figure — an older man, the trainer in a charcoal wrap cardigan and grey sweatpants, close-cropped grey hair and a neat trimmed grey beard — steps quietly into the pool of light from the edge of frame. He kneels beside {character}, places one hand gently on her shoulder, and speaks warmly. {character} lifts her head and listens. Slow lateral track left following the trainer as he enters, settling on a two-shot. Cinematic indie-film feel."

  # 4) 35.50 → 48.00s — "...One more time." + early tail
  - label: one_more_time
    start_sec: 35.50
    duration_sec: 12.50
    image: "@last"
    camera_lora: dolly-out
    camera_lora_strength: 0.8
    prompt: "{character} rises back to her feet and steps into centre floor. She wipes her brow with the back of her wrist, rolls her neck, closes her eyes, and nods to herself. The trainer has stepped back out of frame. Slow dolly-out revealing the empty studio around her — wooden floor, tall mirror, windows. Soft determined expression. Cinematic indie-film feel."

  # 5) 48.00 → 59.92s — silent tail, preparing for the next attempt
  - label: tail_prepare
    start_sec: 48.00
    duration_sec: 11.92
    image: "@last"
    camera_lora: jib-up
    camera_lora_strength: 0.8
    prompt: "{character} takes her starting stance in first position at centre floor, arms rising softly into fifth. A long slow inhale. The camera lifts gently from her eye level up to a high-wide shot looking down at the whole studio — the single spotlight, the lone dancer, the dark corners. She holds the pose, ready to begin again. Cinematic indie-film feel, natural light, grain."
